<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine - Classificador</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilo customizado -->
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 20px;
            padding: 20px;
            background: #ffffff;
            color: #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        #webcam-container canvas {
            border-radius: 15px;
            width: 100%;
            max-width: 300px;
        }

        .btn-start {
            border-radius: 50px;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
        }

        .progress {
            height: 25px;
            border-radius: 20px;
        }

        .label-text {
            font-weight: 600;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<div class="container text-center">
    <div class="card mx-auto" style="max-width: 500px;">
        
        <h2 class="mb-3">📷 Classificador de Imagens</h2>

        <button class="btn btn-primary btn-start mb-3" onclick="init()">
            ▶ Iniciar Câmera
        </button>

        <div id="webcam-container" class="mb-4"></div>

        <div id="label-container"></div>

    </div>
</div>

<!-- TensorFlow + Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
    const URL = "https://teachablemachine.withgoogle.com/models/KsW_ase-Y/";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(300, 300, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        for (let i = 0; i < maxPredictions; i++) {
            const div = document.createElement("div");
            div.classList.add("mb-3");

            div.innerHTML = `
                <div class="label-text">Classe</div>
                <div class="progress">
                    <div class="progress-bar" role="progressbar" style="width: 0%">0%</div>
                </div>
            `;

            labelContainer.appendChild(div);
        }
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);

        for (let i = 0; i < maxPredictions; i++) {
            const prob = prediction[i].probability;
            const percent = (prob * 100).toFixed(1) + "%";

            const container = labelContainer.childNodes[i];
            const label = container.querySelector(".label-text");
            const bar = container.querySelector(".progress-bar");

            label.innerHTML = prediction[i].className;
            bar.style.width = percent;
            bar.innerHTML = percent;

            // muda cor dinamicamente
            bar.className = "progress-bar";
            if (prob > 0.7) bar.classList.add("bg-success");
            else if (prob > 0.4) bar.classList.add("bg-warning");
            else bar.classList.add("bg-danger");
        }
    }
</script>

</body>
</html>
